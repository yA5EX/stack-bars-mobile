<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#141821">
  <title>Stack Bars</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #141821;
      --panel: rgba(24, 28, 36, 0.88);
      --line: rgba(255, 255, 255, 0.14);
      --text: #f7f2e8;
      --muted: #aab0bd;
      --accent: #f0c85a;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "Yu Gothic UI", "Hiragino Sans", system-ui, sans-serif;
      touch-action: manipulation;
      user-select: none;
    }

    body {
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% -5%, rgba(240, 200, 90, 0.2), transparent 38%),
        linear-gradient(160deg, #171b24 0%, #11141a 56%, #241c24 100%);
    }

    .app {
      position: relative;
      width: min(100vw, 560px);
      height: 100dvh;
      min-height: 560px;
      overflow: hidden;
      background: #141821;
      box-shadow: 0 0 0 1px var(--line);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .hud {
      position: absolute;
      top: max(10px, env(safe-area-inset-top));
      left: 10px;
      right: 10px;
      display: grid;
      grid-template-columns: 1fr 92px 1fr;
      gap: 8px;
      pointer-events: none;
    }

    .metric,
    .tap-hint {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 14px 38px rgba(0, 0, 0, 0.26);
      backdrop-filter: blur(14px);
    }

    .metric {
      min-width: 0;
      padding: 8px 9px;
    }

    .metric.center {
      text-align: center;
    }

    .metric.right {
      text-align: right;
    }

    .label {
      display: block;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.1;
    }

    .value {
      display: block;
      margin-top: 4px;
      font-size: clamp(18px, 6vw, 29px);
      font-weight: 850;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .tap-hint {
      position: absolute;
      left: 50%;
      bottom: max(12px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      width: min(360px, calc(100% - 20px));
      padding: 10px 12px;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
      pointer-events: none;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(7, 9, 13, 0.58);
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease;
    }

    .overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .dialog {
      width: min(360px, 100%);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(22, 26, 34, 0.94);
      box-shadow: 0 26px 80px rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(18px);
      padding: 20px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 11vw, 52px);
      line-height: 1;
    }

    .message {
      margin: 12px 0 18px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    button {
      width: 100%;
      min-height: 46px;
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: #19170f;
      font: 850 15px/1 "Segoe UI", "Yu Gothic UI", sans-serif;
      cursor: pointer;
    }

    .flash {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
    }

    .flash.show {
      animation: flash 170ms ease-out;
    }

    @keyframes flash {
      from { opacity: 0.22; }
      to { opacity: 0; }
    }
  </style>
</head>
<body>
  <main class="app" aria-label="Stack Bars">
    <canvas id="game"></canvas>

    <section class="hud" aria-live="polite">
      <div class="metric">
        <span class="label">SCORE</span>
        <span class="value" id="score">0</span>
      </div>
      <div class="metric center">
        <span class="label">SPEED</span>
        <span class="value" id="speed">1.0</span>
      </div>
      <div class="metric right">
        <span class="label">BEST</span>
        <span class="value" id="best">0</span>
      </div>
    </section>

    <div class="tap-hint">タップで止める / Space・Enter</div>
    <div class="flash" id="flash"></div>

    <section class="overlay visible" id="overlay">
      <div class="dialog">
        <h1 id="overlayTitle">Stack Bars</h1>
        <p class="message" id="overlayMessage">動く棒を止めて</p>
        <button id="startButton" type="button">スタート</button>
      </div>
    </section>
  </main>

  <script>
    const BEST_KEY = "stack-bars-best";
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const speedEl = document.getElementById("speed");
    const bestEl = document.getElementById("best");
    const overlay = document.getElementById("overlay");
    const overlayTitle = document.getElementById("overlayTitle");
    const overlayMessage = document.getElementById("overlayMessage");
    const startButton = document.getElementById("startButton");
    const flash = document.getElementById("flash");
    const colors = ["#f0c85a", "#67d8a8", "#69aef7", "#ef7b9d", "#d6a3ff", "#ff9f68"];

    const game = {
      running: false,
      started: false,
      score: 0,
      best: Number(localStorage.getItem(BEST_KEY) || 0),
      speedLevel: 1,
      direction: 1,
      cameraY: 0,
      targetCameraY: 0,
      stack: [],
      active: null,
      last: 0,
      dpr: 1,
      w: 0,
      h: 0
    };

    updateHud();

    function resize() {
      const rect = canvas.getBoundingClientRect();
      game.dpr = Math.min(devicePixelRatio || 1, 2);
      game.w = Math.round(rect.width);
      game.h = Math.round(rect.height);
      canvas.width = Math.round(game.w * game.dpr);
      canvas.height = Math.round(game.h * game.dpr);
      ctx.setTransform(game.dpr, 0, 0, game.dpr, 0, 0);
      if (!game.running && !game.started) resetPreview();
    }

    function baseBar() {
      const width = Math.min(312, game.w * 0.72);
      return {
        x: (game.w - width) / 2,
        y: game.h - 118,
        width,
        height: 28,
        color: "#77808f"
      };
    }

    function resetPreview() {
      const base = baseBar();
      game.stack = [base];
      game.active = {
        x: 18,
        y: base.y - 42,
        width: base.width,
        height: base.height,
        color: colors[0],
        vx: 180
      };
      game.cameraY = 0;
      game.targetCameraY = 0;
      draw();
    }

    function startGame() {
      game.running = true;
      game.started = true;
      game.score = 0;
      game.speedLevel = 1;
      game.direction = 1;
      game.cameraY = 0;
      game.targetCameraY = 0;
      game.stack = [baseBar()];
      spawnBar();
      overlay.classList.remove("visible");
      updateHud();
      game.last = performance.now();
    }

    function spawnBar() {
      const prev = game.stack[game.stack.length - 1];
      const startX = game.direction > 0 ? -prev.width - 28 : game.w + 28;
      game.active = {
        x: startX,
        y: prev.y - 42,
        width: prev.width,
        height: prev.height,
        color: colors[game.score % colors.length],
        vx: (180 + game.score * 16) * game.direction
      };
      game.direction *= -1;
      game.targetCameraY = Math.max(0, game.h - 242 - game.active.y);
    }

    function placeBar() {
      if (!game.running) return;
      const prev = game.stack[game.stack.length - 1];
      const active = game.active;
      const left = Math.max(prev.x, active.x);
      const right = Math.min(prev.x + prev.width, active.x + active.width);
      const overlap = right - left;

      if (overlap <= 4) {
        endGame();
        pulse("#ff6a78");
        return;
      }

      const perfect = Math.abs(active.x - prev.x) <= 5;
      const placed = {
        x: perfect ? prev.x : left,
        y: active.y,
        width: perfect ? prev.width : overlap,
        height: active.height,
        color: active.color
      };

      if (perfect) {
        placed.width = Math.min(placed.width + 8, Math.min(326, game.w * 0.76));
        placed.x = Math.max(12, Math.min(game.w - placed.width - 12, placed.x - 4));
        game.score += 2;
      } else {
        game.score += 1;
      }

      game.stack.push(placed);
      game.stack = game.stack.slice(-13);
      game.speedLevel = 1 + game.score * 0.09;
      game.best = Math.max(game.best, game.score);
      localStorage.setItem(BEST_KEY, String(game.best));
      spawnBar();
      updateHud();
      pulse("#67d8a8");
    }

    function endGame() {
      game.running = false;
      overlayTitle.textContent = "Game Over";
      overlayMessage.textContent = `スコア ${game.score}。もう一回、今度はもっと高く。`;
      startButton.textContent = "リトライ";
      overlay.classList.add("visible");
      updateHud();
    }

    function updateHud() {
      scoreEl.textContent = game.score;
      speedEl.textContent = game.speedLevel.toFixed(1);
      bestEl.textContent = game.best;
    }

    function pulse(color) {
      flash.style.background = color;
      flash.classList.remove("show");
      void flash.offsetWidth;
      flash.classList.add("show");
    }

    function drawBackground() {
      ctx.clearRect(0, 0, game.w, game.h);
      ctx.fillStyle = "#141821";
      ctx.fillRect(0, 0, game.w, game.h);
      ctx.strokeStyle = "rgba(255,255,255,0.055)";
      const grid = 38;
      const offset = (game.cameraY * 0.35) % grid;
      for (let y = -grid + offset; y < game.h + grid; y += grid) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(game.w, y);
        ctx.stroke();
      }
      const glow = ctx.createRadialGradient(game.w / 2, game.h * 0.28, 20, game.w / 2, game.h * 0.28, game.w * 0.72);
      glow.addColorStop(0, "rgba(240,200,90,0.13)");
      glow.addColorStop(1, "rgba(240,200,90,0)");
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, game.w, game.h);
    }

    function drawBar(bar) {
      const y = bar.y + game.cameraY;
      ctx.fillStyle = "rgba(0,0,0,0.25)";
      roundRect(bar.x + 6, y + 7, bar.width, bar.height, 5);
      ctx.fill();
      const grad = ctx.createLinearGradient(bar.x, y, bar.x, y + bar.height);
      grad.addColorStop(0, shade(bar.color, 16));
      grad.addColorStop(1, shade(bar.color, -20));
      ctx.fillStyle = grad;
      roundRect(bar.x, y, bar.width, bar.height, 5);
      ctx.fill();
      ctx.fillStyle = "rgba(255,255,255,0.17)";
      roundRect(bar.x + 7, y + 5, Math.max(0, bar.width - 14), 4, 2);
      ctx.fill();
    }

    function roundRect(x, y, w, h, r) {
      const radius = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.arcTo(x + w, y, x + w, y + h, radius);
      ctx.arcTo(x + w, y + h, x, y + h, radius);
      ctx.arcTo(x, y + h, x, y, radius);
      ctx.arcTo(x, y, x + w, y, radius);
      ctx.closePath();
    }

    function shade(hex, amount) {
      const value = parseInt(hex.slice(1), 16);
      const r = Math.max(0, Math.min(255, (value >> 16) + amount));
      const g = Math.max(0, Math.min(255, ((value >> 8) & 255) + amount));
      const b = Math.max(0, Math.min(255, (value & 255) + amount));
      return `rgb(${r},${g},${b})`;
    }

    function draw() {
      drawBackground();
      game.stack.forEach(drawBar);
      if (game.active) drawBar(game.active);
      if (game.running && game.active) {
        const prev = game.stack[game.stack.length - 1];
        const y = prev.y + game.cameraY - 11;
        ctx.strokeStyle = "rgba(245,241,232,0.3)";
        ctx.setLineDash([5, 7]);
        ctx.strokeRect(prev.x, y, prev.width, prev.height + 22);
        ctx.setLineDash([]);
      }
    }

    function tick(now) {
      const dt = Math.min(0.034, (now - game.last) / 1000 || 0);
      game.last = now;
      if (game.running && game.active) {
        game.active.x += game.active.vx * dt;
        if (game.active.vx > 0 && game.active.x + game.active.width > game.w + game.active.width * 0.2) {
          game.active.vx *= -1;
          game.active.x = game.w + game.active.width * 0.2 - game.active.width;
        } else if (game.active.vx < 0 && game.active.x < -game.active.width * 0.2) {
          game.active.vx *= -1;
          game.active.x = -game.active.width * 0.2;
        }
      }
      game.cameraY += (game.targetCameraY - game.cameraY) * Math.min(1, dt * 7);
      draw();
      requestAnimationFrame(tick);
    }

    function handleAction(event) {
      if (event) event.preventDefault();
      if (overlay.classList.contains("visible")) {
        startGame();
      } else {
        placeBar();
      }
    }

    startButton.addEventListener("click", handleAction);
    canvas.addEventListener("pointerdown", handleAction);
    window.addEventListener("keydown", (event) => {
      if (event.code === "Space" || event.code === "Enter") handleAction(event);
    });
    window.addEventListener("resize", resize);
    resize();
    requestAnimationFrame(tick);
  </script>
</body>
</html>
